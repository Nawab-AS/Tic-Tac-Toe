<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./index.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>
        <p>Welcome to Tic-Tac-Toe!</p>
        
        <div class="option">
            <p>AI Difficulty</p>
            <select name="" id="">
                <option value="two-player">Two Players</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        
        <table>
            <tr>
                <td>X</td>
                <td>O</td>
                <td>X</td>
            </tr>
            <tr>
                <td>O</td>
                <td>X</td>
                <td>O</td>
            </tr>
            <tr>
                <td>X</td>
                <td>O</td>
                <td>X</td>
            </tr>
        </table>

        <button id="action">Start as O</button>
    </div>
</body>
</html>
